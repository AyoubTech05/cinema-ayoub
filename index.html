<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سينيما ايوب - الواجهة السينمائية الهادئة والأكثر جاذبية</title>

<meta name="theme-color" content="#E50914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سينيما ايوب">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

<link rel="manifest" id="pwaManifest">

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-main: #0b0f19; /* أزرق ليلي عميق وهادئ بدلاً من السواد القاتم */
  --bg-card: #151b2c;
  --bg-header: rgba(11, 15, 25, 0.85);
  --border-color: rgba(255, 255, 255, 0.06);
  --primary: #E50914; /* لون نتفليكس الشهير */
  --primary-glow: rgba(229, 9, 20, 0.4);
  --text-main: #ffffff;
  --text-muted: #94a3b8;
  --success: #10b981;
}

* { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
body { margin: 0; font-family: 'Tajawal', sans-serif; background: var(--bg-main); color: var(--text-main); overflow-x: hidden; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }

/* تأثير إضاءة خلفية هادئ للموقع لمنع الجمود البصري */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 10% 20%, rgba(229, 9, 20, 0.04) 0%, transparent 50%),
              radial-gradient(circle at 90% 80%, rgba(24, 119, 242, 0.03) 0%, transparent 50%);
  z-index: -1;
  pointer-events: none;
}

/* هيدر سينيما ايوب الفاخر */
header { position: sticky; top: 0; z-index: 100; display: flex; gap: 20px; align-items: center; justify-content: space-between; padding: 16px 5%; background: var(--bg-header); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); }
.logo { font-size: 28px; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; text-shadow: 0 0 12px var(--primary-glow); }
.logo span { font-size: 11px; color: #fff; background: linear-gradient(135deg, var(--primary), #b80710); padding: 3px 8px; border-radius: 6px; font-weight: 800; text-shadow: none; }

.nav-cluster { display: flex; gap: 12px; align-items: center; }
button, input, select { font-family: inherit; }
button { cursor: pointer; outline: none; }

/* أزرار وعناصر التحكم الأنيقة */
.tab, .btn { border: 1px solid transparent; background: transparent; color: var(--text-main); padding: 10px 18px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; border-radius: 8px; }
.tab { color: var(--text-muted); }
.tab:hover { color: #fff; background: rgba(255,255,255,0.03); }
.tab.active { color: #fff; font-weight: 900; background: rgba(255,255,255,0.06); border-color: var(--border-color); }

.btn.primary { background: linear-gradient(185deg, var(--primary), #b80710); color: #fff; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.35); }
.btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); }
.btn.secondary { background: rgba(255, 255, 255, 0.06); color: white; border: 1px solid var(--border-color); }
.btn.secondary:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }

/* شريط البحث المطور */
.search { background: rgba(15, 22, 40, 0.6); border: 1px solid var(--border-color); border-radius: 10px; padding: 0 14px; display: flex; align-items: center; gap: 10px; width: 320px; }
.search input { width: 100%; height: 42px; background: transparent; border: 0; outline: 0; color: white; font-size: 14px; font-weight: 500; }
.mic-btn { background: transparent; border: none; color: var(--text-muted); font-size: 15px; cursor: pointer; }
.mic-btn:hover { color: #fff; }

main { padding: 0; }

/* البانر الرئيسي الأكثر جاذبية وأناقة */
.hero { position: relative; height: 70vh; min-height: 480px; display: flex; align-items: flex-end; padding: 5% 6%; background-size: cover; background-position: center top; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); }
.hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to right, rgba(11, 15, 25, 0.95) 30%, rgba(11, 15, 25, 0.4) 70%, transparent 100%), linear-gradient(to top, var(--bg-main) 0%, transparent 50%); }
.hero-content { position: relative; z-index: 2; max-width: 650px; }
h1 { font-size: clamp(30px, 4.5vw, 50px); line-height: 1.2; margin: 0 0 18px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
.hero p { color: #cbd5e1; line-height: 1.7; font-size: 16px; margin-bottom: 25px; }

/* شريط التصنيفات الهادئ والجذاب */
.mood-container { padding: 20px 5% 0; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.mood-container::-webkit-scrollbar { display: none; }
.mood-btn { padding: 10px 20px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-color); color: #cbd5e1; font-weight: 700; font-size: 13px; white-space: nowrap; cursor: pointer; }
.mood-btn.active, .mood-btn:hover { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

/* شبكة العروض الاحترافية الجذابة */
.section-wrapper { padding: 0 5% 40px; }
.bar { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 18px; }
.bar h2 { font-weight: 800; font-size: 22px; margin: 0; color: #f8fafc; position: relative; padding-right: 12px; }
.bar h2::before { content: ''; position: absolute; right: 0; top: 4px; bottom: 4px; width: 4px; background: var(--primary); border-radius: 2px; }
.bar span { color: var(--text-muted); font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.04); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-color); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
.card { background: var(--bg-card); border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
.card:hover { transform: scale(1.05) translateY(-5px); z-index: 5; box-shadow: 0 12px 24px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.15); }
.poster { position: relative; aspect-ratio: 2/3; background: #070b12; }
.poster img { width: 100%; height: 100%; object-fit: cover; }
.rating { position: absolute; top: 10px; left: 10px; background: rgba(11, 15, 25, 0.9); color: #fbbf24; border-radius: 6px; padding: 4px 8px; font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--border-color); }
.info { padding: 12px; }
.info h3 { margin: 0; font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f8fafc; }

/* سجل المتابعة الذكي المبسط */
.history-section { display: none; margin-bottom: 25px; }
.history-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
.history-scroll::-webkit-scrollbar { display: none; }
.history-pill { background: rgba(255,255,255,0.04); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; white-space: nowrap; font-weight: 700; color: #e2e8f0; }
.history-pill:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }

.status { display: none; margin: 20px 0; padding: 16px; border-radius: 8px; background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: bold; text-align: center; font-size: 14px; border: 1px solid var(--border-color); }
.status.show { display: block; }

/* شريط التحكم السفلي العائم للهواتف المحمولة */
.cyber-dock { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(21, 27, 44, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; padding: 10px; z-index: 1000; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.dock-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; background: transparent; border: none; padding: 6px 12px; border-radius: 10px; }
.dock-item i { font-size: 18px; }
.dock-item:hover, .dock-item.active { color: #fff; }
.dock-item.active i { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }

/* مودال تفاصيل المسلسلات والمشاهدة المبسط والجذاب */
.modal { position: fixed; inset: 0; display: none; place-items: center; background: rgba(7, 10, 18, 0.9); z-index: 2000; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
.modal.open { display: grid; }
.dialog { width: min(900px, 100%); background: #111625; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; border: 1px solid var(--border-color); }
.dhero { position: relative; height: 340px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 30px; }
.dhero:before { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, #111625 15%, transparent 100%); }
.dhero-content { position: relative; z-index: 2; width: 100%; }
.close { position: absolute; top: 16px; left: 16px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: white; font-size: 22px; display: grid; place-items: center; z-index: 10; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.close:hover { background: #fff; color: #000; }

.modal-body { padding: 30px; }
.modal-main h2 { margin: 0 0 14px; font-size: 30px; font-weight: 900; }
.modal-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.pill { display: inline-block; padding: 4px 10px; background: rgba(255,255,255,0.06); border-radius: 6px; font-size: 13px; font-weight: 700; color: #e2e8f0; border: 1px solid var(--border-color); }
.pill.match { color: var(--success); background: transparent; border: none; padding: 0; font-size: 14px; }
#overview { color: #cbd5e1; line-height: 1.7; font-size: 15px; margin: 0; }

.modal-actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
.ep-select { background: rgba(255,255,255,0.02); padding: 16px 20px; display: flex; gap: 16px; border-radius: 8px; margin: 20px 30px 0; flex-wrap: wrap; align-items: center; border: 1px solid var(--border-color); }
.ep-select label { font-weight: 700; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.ep-select select { background: #0b0f19; color: #fff; border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 6px; font-weight: 700; outline: none; cursor: pointer; }

/* صندوق المشغل والسيرفرات الكلاسيكي */
.player-ambient-wrapper { padding: 0 30px 30px; }
.player { display: none; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
.player.show { display: block; }
iframe { width: 100%; aspect-ratio: 16/9; border: 0; background: #000; display: block; }
.servers { display: flex; gap: 10px; flex-wrap: wrap; padding: 14px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border-color); }
.server { border: none; background: rgba(255,255,255,0.06); color: #fff; border-radius: 6px; padding: 10px 16px; font-weight: 700; font-size: 13px; cursor: pointer; }
.server.active { background: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

/* الاستجابة والتوافقية */
@media (min-width: 769px) {
  .cyber-dock { display: none; }
  #desktopInstallBtn { display: inline-flex; }
}

@media (max-width: 768px) {
  body { padding-bottom: 110px; }
  header { padding: 12px 4%; }
  .logo { font-size: 24px; }
  .search { width: 100%; max-width: 100%; order: 3; margin-top: 10px; }
  #desktopInstallBtn { display: none !important; }
  .hero { height: 50vh; padding: 6% 5%; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
  .modal-body { padding: 20px; }
  .dhero { height: 200px; padding: 20px; }
  .modal-main h2 { font-size: 24px; }
  .ep-select { margin: 15px; padding: 12px; gap: 10px; }
  .player-ambient-wrapper { padding: 0 15px 15px; }
  .modal-actions .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<header>
  <div class="nav-cluster">
    <a href="#" class="logo" onclick="window.location.reload();">سينيما ايوب<span>PRO</span></a>
    <button class="tab active" data-type="movie">أفلام</button>
    <button class="tab" data-type="tv">مسلسلات</button>
  </div>
  
  <div class="search">
    <i class="fas fa-search" style="color:var(--text-muted)"></i>
    <input id="search" placeholder="ابحث عن الأفلام والمسلسلات...">
    <button class="mic-btn" id="micSearchBtn"><i class="fas fa-microphone"></i></button>

  <div class="nav-cluster">
    <button class="tab" id="favOnly"><i class="fas fa-heart"></i> القائمة</button>

<main>

    <h1 id="heroTitle">عالم من الترفيه المطلق</h1>
    <p id="heroDesc">مرحباً بك في سينيما ايوب بحلتها الجديدة الهادئة. تصفح وشاهد عروضك المفضلة بجودة عالية وبدون انقطاع وبواجهة مريحة وسريعة.</p>
    <div class="hero-actions">
       <button class="btn primary" id="heroPlayBtn"><i class="fas fa-play"></i> تشغيل العرض البارز</button>

<div class="mood-container" id="moodContainer">

   <button class="mood-btn" data-genre="35">😂 كوميديا وضاحك</button>
   <button class="mood-btn" data-genre="27">👻 رعب وتشويق</button>

</div>

<div class="section-wrapper">
  <div class="history-section" id="historySection">
     <div class="bar"><h2>⏱️ تابع المشاهدة والتنزيل</h2></div>

  <div class="bar">

   <button class="dock-item active" id="dockHome"><i class="fas fa-home"></i>الرئيسية</button>
   <button class="dock-item" id="dockLucky"><i class="fas fa-random"></i>اقتراح عشوائي</button>
   <button class="dock-item" id="dockFav"><i class="fas fa-heart"></i>المفضلة</button>

      <div class="dhero-content">
        <h2 id="mtitle"></h2>

          <div class="modal-meta" id="meta"></div>

            <button class="btn primary" id="playBtn" style="font-size:15px; padding:12px 24px;"><i class="fas fa-play"></i> تشغيل الآن</button>

<script>
const API="api_key=1cf50e6248dc270629e802686245c2c8";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";
const BACK="https://image.tmdb.org/t/p/w1280";
const FALL="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=900&q=80";

function getAutoServers(type, id, season = 1, episode = 1) {
  const queryConfig = "?sub_lang=ar&sub_translate=1&primaryColor=E50914";
  if (type === "movie") {
    return [
      { name: "🎬 سيرفر البث الرئيسي عالي الدقة", url: `https://vidsrc.me/embed/movie/${id}${queryConfig}`, dl: `https://vidsrc.me/embed/movie/${id}` },
      { name: "⚡ سيرفر البث الاحتياطي السريع", url: `https://vidlink.org/embed/movie/${id}?primaryColor=E50914`, dl: `https://vidlink.org/embed/movie/${id}` }
    ];
  } else {
    return [
      { name: "🎬 سيرفر الحلقات المباشر الذكي", url: `https://vidsrc.me/embed/tv/${id}/${season}/${episode}${queryConfig}`, dl: `https://vidsrc.me/embed/tv/${id}/${season}/${episode}` },
      { name: "⚡ سيرفر البث الاحتياطي السريع", url: `https://vidlink.org/embed/tv/${id}/${season}/${episode}?primaryColor=E50914`, dl: `https://vidlink.org/embed/tv/${id}/${season}/${episode}` }
    ];
  }
}

let state={type:"movie",filter:"popular",page:1,query:"",items:[],favOnly:false,active:null,currentDlUrl:""};
const $=id=>document.getElementById(id);
const favs=new Map(JSON.parse(localStorage.getItem("ayoub-favs")||"[]"));
let localWatchHistory = JSON.parse(localStorage.getItem("ayoub-history-tracker") || "[]");

function saveFavs(){localStorage.setItem("ayoub-favs",JSON.stringify([...favs.entries()]));}
function key(x){return state.type+"-"+x.id}
function name(x){return x.title||x.name||"بدون عنوان"}
function date(x){return x.release_date||x.first_air_date||""}
function poster(x){return x.poster_path?IMG+x.poster_path:FALL}
function back(x){return x.backdrop_path?BACK+x.backdrop_path:poster(x)}
function showStatus(t,on=true){$("status").textContent=t;$("status").classList.toggle("show",on)}
async function get(url){let r=await fetch(url);if(!r.ok)throw Error("خطأ في الاتصال بالخادم");return r.json()}

function initPwaManifest() {
  const myManifest = {
    "short_name": "سينيما ايوب",
    "name": "سينيما ايوب - المنصة الاحترافية",
    "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/2503/2503508.png", "type": "image/png", "sizes": "512x512" }],
    "start_url": window.location.href,
    "background_color": "#0b0f19",
    "theme_color": "#E50914",
    "display": "standalone",
    "orientation": "portrait"
  };
  const blob = new Blob([JSON.stringify(myManifest)], {type: 'application/json'});
  $("pwaManifest").setAttribute('href', URL.createObjectURL(blob));
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  $("desktopInstallBtn").style.display = "inline-flex";
  $("mobileInstallBtn").style.display = "flex";
});

const triggerInstallLogic = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      $("desktopInstallBtn").style.display = "none";
      $("mobileInstallBtn").style.display = "none";
      deferredPrompt = null;
    }
  }
};

$("desktopInstallBtn").onclick = triggerInstallLogic;
$("mobileInstallBtn").onclick = triggerInstallLogic;

function makeUrl(){
  const lang="language=ar-SA&include_adult=false";
  if(state.query)return `${BASE}/search/${state.type}?${API}&${lang}&query=${encodeURIComponent(state.query)}&page=${state.page}`;
  if(["popular","top_rated"].includes(state.filter))return `${BASE}/${state.type}/${state.filter}?${API}&${lang}&page=${state.page}`;
  if(state.type==="movie"&&["now_playing","upcoming"].includes(state.filter))return `${BASE}/movie/${state.filter}?${API}&${lang}&page=${state.page}`;
  if(state.type==="tv"&&state.filter==="airing_today")return `${BASE}/tv/airing_today?${API}&${lang}&page=${state.page}`;
  return `${BASE}/discover/${state.type}?${API}&${lang}&with_genres=${state.filter}&page=${state.page}`;
}

async function load(reset=false){
  if(reset){state.items=[];state.page=1;$("grid").innerHTML=""}
  showStatus("جاري تهيئة العروض والاتصال بالخادم...");
  try{
    let data=await get(makeUrl());
    let items=data.results||[];
    if(state.favOnly)items=items.filter(x=>favs.has(key(x)));
    state.items=reset?items:[...state.items,...items];
    render(state.items);
    $("count").textContent = state.type === "movie" ? "أفلام حصرية متوفرة" : "مسلسلات جاهزة للبث";
    showStatus("",false);
    
    if(state.items[0]) {
      $("heroBanner").style.backgroundImage = `url(${back(state.items[0])})`;
      $("heroTitle").textContent = name(state.items[0]);
      $("heroDesc").textContent = state.items[0].overview || "عرض سينمائي مميز مجهز بحزم عناصر البث المباشر فائق الدقة بدون إعلانات من سينيما ايوب.";
    }
  }catch(e){showStatus(e.message)}
}

function render(items){
  items.forEach(x=>{
    let k=key(x);
    let c=document.createElement("article");
    c.className="card";
    c.innerHTML=`
      <div class="poster">
        <img src="${poster(x)}" alt="${name(x)}" loading="lazy">
        <span class="rating"><i class="fas fa-star"></i> ${(x.vote_average || 7.5).toFixed(1)}</span>
      </div>
      <div class="info">
         <h3>${name(x)}</h3>
      </div>`;
    c.onclick=()=>openDetails(x);
    $("grid").appendChild(c);
  });
}

async function openDetails(x, savedS=null, savedE=null){
  state.active=x;
  $("modal").classList.add("open");
  $("playerBox").classList.remove("show");
  $("epSelectBox").style.display = "none";
  $("iframePlayer").src = "";
  
  $("dhero").style.backgroundImage=`url(${back(x)})`;
  $("mtitle").textContent=name(x);
  $("overview").textContent=x.overview||"عمل سينمائي حصري ومميز مجهز بحزم خوادم البث المباشر الاحترافية والآمنة.";
  $("meta").innerHTML=[
    `<span class="pill match">${(x.vote_average*10 || 75).toFixed(0)}% متطابق</span>`,
    `<span class="pill">${date(x).slice(0,4)||"جديد"}</span>`,
    `<span class="pill">${state.type==="movie"?"فيلم كامل":"مسلسل"}</span>`
  ].join("");
  $("saveBtn").innerHTML = favs.has(key(x)) ? `<i class="fas fa-check"></i> في قائمتك` : `<i class="fas fa-plus"></i> حفظ في القائمة`;

  syncDownloadTarget();

  if(state.type === "tv") {
     try {
        let details = await get(`${BASE}/tv/${x.id}?${API}&language=ar-SA`);
        let sSelect = $("seasonNum"); sSelect.innerHTML = "";
        details.seasons.forEach(s => {
           if(s.season_number > 0) {
              sSelect.innerHTML += `<option value="${s.season_number}">الموسم ${s.season_number}</option>`;
           }
        });
        $("epSelectBox").style.display = "flex";
        
        const updateEpisodes = async () => {
           let sNum = sSelect.value;
           let sDetails = await get(`${BASE}/tv/${x.id}/season/${sNum}?${API}&language=ar-SA`);
           let eSelect = $("episodeNum"); eSelect.innerHTML = "";
           sDetails.episodes.forEach(e => {
              eSelect.innerHTML += `<option value="${e.episode_number}">الحلقة ${e.episode_number}</option>`;
           });
           if(savedE) { eSelect.value = savedE; savedE = null; }
           syncDownloadTarget();
        };
        
        sSelect.onchange = updateEpisodes;
        if(savedS) sSelect.value = savedS;
        await updateEpisodes();
     } catch(e) { console.log(e); }
  }
}

function syncDownloadTarget() {
   const s = state.type === "tv" ? $("seasonNum").value : 1;
   const e = state.type === "tv" ? $("episodeNum").value : 1;
   const list = getAutoServers(state.type, state.active.id, s, e);
   state.currentDlUrl = list[0].dl;
}

function startStreaming() {
  const x=state.active;
  const s = state.type === "tv" ? $("seasonNum").value : 1;
  const e = state.type === "tv" ? $("episodeNum").value : 1;
  let list = getAutoServers(state.type, x.id, s, e);
  
  $("playerBox").classList.add("show");
  $("servers").innerHTML="";
  list.forEach((srv,i)=>{
    let b=document.createElement("button");
    b.className="server"+(i===0?" active":"");
    b.textContent=srv.name;
    b.onclick=()=>{
       state.currentDlUrl = srv.dl;
       document.querySelectorAll(".server").forEach(el=>el.classList.remove("active"));
       b.classList.add("active");
       $("iframePlayer").src=srv.url;
    };
    $("servers").appendChild(b);
  });
  $("iframePlayer").src=list[0].url;
  saveToHistory(x, s, e);
}

function saveToHistory(item, s, e) {
   localWatchHistory = localWatchHistory.filter(h => h.id !== item.id || h.type !== state.type);
   localWatchHistory.unshift({ id: item.id, type: state.type, title: name(item), season: s, episode: e, fullData: item });
   if(localWatchHistory.length > 5) localWatchHistory.pop();
   localStorage.setItem("ayoub-history-tracker", JSON.stringify(localWatchHistory));
   renderWatchHistoryPills();
}

function renderWatchHistoryPills() {
   if(localWatchHistory.length === 0) { $("historySection").style.display = "none"; return; }
   $("historySection").style.display = "block"; $("historyContainer").innerHTML = "";
   localWatchHistory.forEach(h => {
      let pill = document.createElement("div"); pill.className = "history-pill";
      let labelText = h.type === "tv" ? `موسم ${h.season} - حلقة ${h.episode}` : "فيلم كامل";
      pill.innerHTML = `<i class="fas fa-history" style="color:var(--primary)"></i> <b>${h.title}</b> <span style="color:var(--text-muted); font-size:12px;">(${labelText})</span>`;
      pill.onclick = () => { state.type = h.type; loadActiveTabStyle(); openDetails(h.fullData, h.season, h.episode); };
      $("historyContainer").appendChild(pill);
   });
}

function loadActiveTabStyle() {
   document.querySelectorAll("[data-type]").forEach(b => {
      b.classList.toggle("active", b.dataset.type === state.type);
   });
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
   const recognition = new SpeechRecognition(); recognition.lang = 'ar-DZ';
   recognition.onresult = (e) => {
      const voiceResult = e.results[0][0].transcript;
      $("search").value = voiceResult; state.query = voiceResult; load(true);
   };
   $("micSearchBtn").onclick = () => { recognition.start(); };
} else { $("micSearchBtn").style.display = "none"; }

$("ayoubDownloadBtn").onclick = () => {
   if(state.currentDlUrl) window.open(state.currentDlUrl, '_blank');
};

$("saveBtn").onclick = () => {
   let k = key(state.active);
   if(favs.has(k)) { favs.delete(k); } else { favs.set(k,{item:state.active,type:state.type}); }
   saveFavs();
   $("saveBtn").innerHTML = favs.has(k) ? `<i class="fas fa-check"></i> في قائمتك` : `<i class="fas fa-plus"></i> حفظ في القائمة`;
};

document.querySelectorAll(".mood-btn").forEach(btn => {
   btn.onclick = () => {
      document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.filter = btn.dataset.genre;
      load(true);
   };
});

$("playBtn").onclick = startStreaming;
$("heroPlayBtn").onclick = () => { if(state.items[0]) openDetails(state.items[0]); };
$("heroNewBtn").onclick = () => { state.filter = state.type === "movie" ? "now_playing" : "airing_today"; load(true); };
$("seasonNum").onchange = () => { syncDownloadTarget(); if($("playerBox").classList.contains("show")) startStreaming(); };
$("episodeNum").onchange = () => { syncDownloadTarget(); if($("playerBox").classList.contains("show")) startStreaming(); };
$("close").onclick=()=>{ $("modal").classList.remove("open"); $("iframePlayer").src=""; };
$("modal").onclick=e=>{if(e.target.id==="modal")$("close").click()};
$("search").oninput=()=>{clearTimeout(window.t);window.t=setTimeout(()=>{state.query=$("search").value.trim();load(true)},500)};
$("more").onclick=()=>{state.page++;load(false)};
$("favOnly").onclick=()=>{state.favOnly=!state.favOnly;$("favOnly").classList.toggle("active",state.favOnly);load(true)};

$("dockHome").onclick = () => { state.favOnly = false; $("favOnly").classList.remove("active"); load(true); window.scrollTo({ top: 0, behavior: 'smooth' }); };
$("dockFav").onclick = () => { state.favOnly = true; $("favOnly").classList.add("active"); load(true); };
$("dockLucky").onclick = () => {
   if(state.items.length > 0) {
      let luckyChoice = state.items[Math.floor(Math.random() * state.items.length)];
      openDetails(luckyChoice);
   }
};

document.querySelectorAll("[data-type]").forEach(b=>{
  b.onclick=()=>{
    state.type=b.dataset.type; state.filter="popular"; state.page=1; state.query=""; $("search").value="";
    loadActiveTabStyle(); load(true);
  };
});

initPwaManifest(); load(true); renderWatchHistoryPills();
</script>
</body>
</html>
